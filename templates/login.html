{% extends "base.html" %}
{% block title %}Sign In — Literature Monitor{% endblock %}

{% block content %}
<div style="max-width:400px; margin:40px auto;">
  <h1 style="text-align:center;">Sign In</h1>
  <p style="text-align:center; color:var(--text-muted); margin-bottom:24px;">Monitor academic literature, effortlessly.</p>

  <form method="post" class="card">
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autofocus placeholder="you@university.edu">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required placeholder="Your password">
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Sign In</button>
  </form>

  <p style="text-align:center; margin-top:16px; font-size:14px; color:var(--text-muted);">
    Don't have an account? <a href="{{ url_for('register') }}" style="color:var(--primary);">Create one</a>
  </p>
</div>
{% endblock %}
