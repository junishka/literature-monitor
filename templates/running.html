{% extends "base.html" %}
{% block title %}Searching... — Literature Monitor{% endblock %}

{% block content %}
<div style="text-align:center; padding:20px 0;">
  <h1 style="margin-bottom:8px;">Searching for new papers...</h1>
  <p style="color:var(--text-muted); margin-bottom:24px;">This takes about 1-2 minutes. Enjoy a clip while you wait.</p>

  <div id="video-container" style="max-width:500px; margin:0 auto 24px; border-radius:var(--radius); overflow:hidden; border:2px solid var(--border);">
    <iframe id="cat-video" width="100%" height="315" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen
      style="display:block;"></iframe>
  </div>

  <div id="loading-status" class="card" style="max-width:500px; margin:0 auto;">
    <div style="display:flex; align-items:center; justify-content:center; gap:12px;">
      <div class="spinner"></div>
      <span id="status-text" style="font-size:15px;">Scanning journals...</span>
    </div>
  </div>

  <div id="result" style="display:none; max-width:500px; margin:20px auto 0;">
  </div>
</div>

<style>
  .spinner {
    width: 24px;
    height: 24px;
    border: 3px solid var(--border);
    border-top-color: var(--pink);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
{% endblock %}

{% block scripts %}
<script>
// Playlist of videos — switches every 50 seconds
const videos = [
  'sOV3UCQouyw',   // Your pick
  'Of2HU3LGdbo',   // Cat in shark costume on Roomba
  'J---aiyznGQ',   // Keyboard cat
];
let currentVideo = 0;

function playVideo(index) {
  const iframe = document.getElementById('cat-video');
  iframe.src = `https://www.youtube.com/embed/${videos[index]}?autoplay=1&mute=1`;
}

// Start first video
playVideo(0);

// Switch to next video every 50 seconds
setInterval(() => {
  currentVideo = (currentVideo + 1) % videos.length;
  playVideo(currentVideo);
}, 50000);

// Status messages to cycle through
const messages = [
  'Scanning journals...',
  'Searching titles and abstracts...',
  'Checking for new papers...',
  'Cross-referencing your keywords...',
  'Almost there...',
];

let msgIndex = 0;
const statusInterval = setInterval(() => {
  msgIndex = (msgIndex + 1) % messages.length;
  document.getElementById('status-text').textContent = messages[msgIndex];
}, 4000);

// Poll for search completion every 3 seconds
function checkStatus() {
  fetch('/run/status')
    .then(r => r.json())
    .then(data => {
      if (data.status === 'running') {
        setTimeout(checkStatus, 3000);
        return;
      }

      clearInterval(statusInterval);
      const loadingEl = document.getElementById('loading-status');
      const resultEl = document.getElementById('result');

      if (data.status === 'ok') {
        loadingEl.style.display = 'none';
        if (data.total > 0) {
          resultEl.innerHTML = `
            <div class="card" style="background:var(--pink-light); border-color:var(--pink);">
              <h2 style="margin-bottom:8px;">Found ${data.total} new paper${data.total !== 1 ? 's' : ''}!</h2>
              <p style="margin-bottom:12px;">Your digest is ready.</p>
              <a href="/" class="btn btn-primary">Back to Dashboard</a>
              <a href="/digests" class="btn btn-secondary" style="margin-left:8px;">View Digests</a>
            </div>`;
        } else {
          resultEl.innerHTML = `
            <div class="card">
              <h2 style="margin-bottom:8px;">No new papers found</h2>
              <p style="margin-bottom:12px;">All caught up! Check back later.</p>
              <a href="/" class="btn btn-primary">Back to Dashboard</a>
            </div>`;
        }
        resultEl.style.display = 'block';
      } else {
        loadingEl.innerHTML = `
          <div style="color:var(--error);">
            <strong>Search failed:</strong> ${data.message || 'Unknown error'}
          </div>
          <a href="/" class="btn btn-secondary" style="margin-top:12px;">Back to Dashboard</a>`;
      }
    })
    .catch(() => {
      // Network blip, retry
      setTimeout(checkStatus, 3000);
    });
}

// Start polling after a short delay
setTimeout(checkStatus, 2000);
</script>
{% endblock %}
