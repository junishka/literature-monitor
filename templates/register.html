{% extends "base.html" %}
{% block title %}Create Account — Literature Monitor{% endblock %}

{% block content %}
<div style="max-width:400px; margin:40px auto;">
  <h1 style="text-align:center;">Create Account</h1>
  <p style="text-align:center; color:var(--text-muted); margin-bottom:24px;">Set up your literature monitoring in minutes.</p>

  <form method="post" class="card">
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Your name" autofocus>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required placeholder="you@university.edu">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required placeholder="At least 6 characters">
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Create Account</button>
  </form>

  <p style="text-align:center; margin-top:16px; font-size:14px; color:var(--text-muted);">
    Already have an account? <a href="{{ url_for('login') }}" style="color:var(--primary);">Sign in</a>
  </p>
</div>
{% endblock %}
