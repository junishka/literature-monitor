{% extends "base.html" %}
{% block title %}Settings — Literature Monitor{% endblock %}

{% block content %}
<h1>Settings</h1>

<form method="post" class="card">
  <h2>Email</h2>
  <div class="form-row">
    <div class="form-group">
      <label for="email_sender">Sender Email (Gmail)</label>
      <input type="email" id="email_sender" name="email_sender" value="{{ settings.get('email_sender', '') }}" placeholder="you@gmail.com">
    </div>
    <div class="form-group">
      <label for="email_password">Gmail App Password</label>
      <input type="password" id="email_password" name="email_password" placeholder="{{ settings.get('email_password_masked', 'Enter app password') }}">
      <div class="form-hint">Get one at <a href="https://myaccount.google.com/apppasswords" target="_blank">myaccount.google.com/apppasswords</a></div>
    </div>
  </div>
  <div class="form-group">
    <label for="email_recipients">Send Digest To</label>
    <input type="text" id="email_recipients" name="email_recipients" value="{{ settings.get('email_recipients', '') }}" placeholder="email1@example.com, email2@example.com">
    <div class="form-hint">Comma-separated email addresses.</div>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="smtp_host">SMTP Host</label>
      <input type="text" id="smtp_host" name="smtp_host" value="{{ settings.get('smtp_host', 'smtp.gmail.com') }}">
    </div>
    <div class="form-group">
      <label for="smtp_port">SMTP Port</label>
      <input type="number" id="smtp_port" name="smtp_port" value="{{ settings.get('smtp_port', '587') }}">
    </div>
  </div>

  <h2 style="margin-top:24px;">Schedule</h2>
  <div class="form-row">
    <div class="form-group">
      <label for="schedule_frequency">Frequency</label>
      <select id="schedule_frequency" name="schedule_frequency">
        <option value="daily" {{ 'selected' if settings.get('schedule_frequency') == 'daily' }}>Daily</option>
        <option value="weekly" {{ 'selected' if settings.get('schedule_frequency', 'weekly') == 'weekly' }}>Weekly</option>
        <option value="biweekly" {{ 'selected' if settings.get('schedule_frequency') == 'biweekly' }}>Every 2 Weeks</option>
        <option value="monthly" {{ 'selected' if settings.get('schedule_frequency') == 'monthly' }}>Monthly</option>
      </select>
    </div>
    <div class="form-group">
      <label for="schedule_day">Day of Week</label>
      <select id="schedule_day" name="schedule_day">
        {% for day in ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'] %}
        <option value="{{ day }}" {{ 'selected' if settings.get('schedule_day', 'monday') == day }}>{{ day|capitalize }}</option>
        {% endfor %}
      </select>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label for="schedule_hour">Time (hour, 24h)</label>
      <input type="number" id="schedule_hour" name="schedule_hour" value="{{ settings.get('schedule_hour', '9') }}" min="0" max="23">
    </div>
    <div class="form-group">
      <label for="lookback_days">Initial Lookback (days)</label>
      <input type="number" id="lookback_days" name="lookback_days" value="{{ settings.get('lookback_days', '30') }}" min="1" max="365">
      <div class="form-hint">How far back to search on first run.</div>
    </div>
  </div>

  <div class="actions" style="margin-top:20px;">
    <button type="submit" class="btn btn-primary">Save Settings</button>
  </div>
</form>

<div class="card">
  <h2>Actions</h2>
  <div class="actions" style="gap:12px;">
    <form method="post" action="{{ url_for('test_email') }}" style="display:inline;">
      <button type="submit" class="btn btn-secondary">Send Test Email</button>
    </form>
    <form method="post" action="{{ url_for('reset_history') }}" style="display:inline;" onsubmit="return confirm('Reset all paper history? Next run will treat all papers as new.')">
      <button type="submit" class="btn btn-danger">Reset Paper History</button>
    </form>
  </div>
</div>

{% endblock %}
