<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Literature Monitor{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <div class="container">
      <a href="{{ url_for('index') }}" class="logo">Lit Monitor</a>
      <a href="{{ url_for('index') }}" class="{{ 'active' if request.endpoint == 'index' }}">Dashboard</a>
      <a href="{{ url_for('journals') }}" class="{{ 'active' if request.endpoint in ('journals', 'journal_search') }}">Journals</a>
      <a href="{{ url_for('digests') }}" class="{{ 'active' if request.endpoint == 'digests' }}">Digests</a>
      <a href="{{ url_for('settings') }}" class="{{ 'active' if request.endpoint == 'settings' }}">Settings</a>
    </div>
  </nav>

  <main>
    <div class="container">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      {% block content %}{% endblock %}
    </div>
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
